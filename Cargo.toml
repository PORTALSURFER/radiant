[package]
name = "radiant"
version = "0.1.0"
edition = "2024"

[lints.rust]
warnings = "deny"
missing_docs = "deny"

[dependencies]
arboard = "3.6.1"
roxmltree = "0.21.1"
winit = "0.30.12"
raw-window-handle = "0.6"
pollster = "0.4.0"
vello = "0.7.0"
skrifa = "0.40.0"
tracing = "0.1.41"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"

[features]
default = []
gui-performance = []
legacy-shell = []

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.61.2", features = [
    "Win32_Foundation",
    "Win32_Graphics",
    "Win32_Graphics_Gdi",
    "Win32_UI_WindowsAndMessaging",
] }

[dev-dependencies]
image = "0.25.9"

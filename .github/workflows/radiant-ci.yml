name: Radiant CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Windows validation
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --lib --tests

      - name: Examples
        run: cargo test --examples

      - name: Documentation
        run: cargo doc --no-deps

      - name: Install portable library targets
        run: rustup target add x86_64-unknown-linux-gnu x86_64-apple-darwin

      - name: Portable library check - Linux
        run: cargo check --lib --no-default-features --target x86_64-unknown-linux-gnu

      - name: Portable library check - macOS
        run: cargo check --lib --no-default-features --target x86_64-apple-darwin

      - name: Performance harness smoke
        shell: pwsh
        run: |
          cargo bench --bench perf_harness -- --list
          cargo bench --bench perf_harness runtime_virtualized_list_hover -- --jsonl --write-baseline-jsonl perf-baseline.jsonl
          cargo bench --bench perf_harness runtime_virtualized_list_hover -- --jsonl --baseline-jsonl perf-baseline.jsonl --fail-on-missing-baseline
